name: app_carlo_subastas_mobile
description: "Carlo Vehicle App - Vehicle registration for auction"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  cached_network_image: ^3.4.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.9.2

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1

  # Camera & Photos
  camera: ^0.11.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  google_mlkit_object_detection: ^0.15.1

  # AI
  google_generative_ai: ^0.4.6
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
